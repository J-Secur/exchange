<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#FF6B00"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="J-Secur"/>
  <meta name="description" content="Messagerie privée sécurisée pour équipes"/>

  <title>J-Secur</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json"/>

  <!-- Icônes Apple -->
  <link rel="apple-touch-icon" href="/assets/icon-192.png"/>
  <link rel="apple-touch-icon" sizes="152x152" href="/assets/icon-152.png"/>
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/icon-180.png"/>

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/icon-32.png"/>

  <!-- Tailwind CSS (CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Styles personnalisés -->
  <link rel="stylesheet" href="/style.css"/>
</head>
<body class="h-full bg-gray-950 text-white overflow-hidden">

<!-- ═══════════════════════════════════════════════════════════════
     TOAST NOTIFICATION
═══════════════════════════════════════════════════════════════ -->
<div id="toast" class="toast" role="alert" aria-live="assertive"></div>

<!-- ═══════════════════════════════════════════════════════════════
     SCREEN 1 — SPLASH
═══════════════════════════════════════════════════════════════ -->
<div id="screen-splash" class="screen screen-splash">
  <div class="splash-content">
    <div class="splash-logo-ring">
      <div class="splash-logo-inner">
        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="32" cy="32" r="28" fill="#FF6B00" opacity="0.15"/>
          <path d="M16 20h32a4 4 0 0 1 4 4v16a4 4 0 0 1-4 4H22l-8 6V24a4 4 0 0 1 4-4z"
                fill="#FF6B00" stroke="#FF6B00" stroke-width="1.5" stroke-linejoin="round"/>
          <path d="M24 30h16M24 36h10" stroke="white" stroke-width="2" stroke-linecap="round"/>
          <circle cx="48" cy="18" r="7" fill="#7ED957"/>
          <path d="M44.5 18l2.5 2.5 5-5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </div>
    <h1 class="splash-title">J-Secur</h1>
    <p class="splash-sub">Messagerie d'équipe sécurisée</p>
    <div class="splash-loader">
      <div class="splash-bar"></div>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════════
     SCREEN 2 — AUTH (Login / Register)
═══════════════════════════════════════════════════════════════ -->
<div id="screen-auth" class="screen hidden">
  <div class="auth-container">
    <!-- Logo compact -->
    <div class="auth-logo">
      <div class="auth-logo-icon">💬</div>
      <h2 class="auth-logo-title">J-Secur</h2>
    </div>

    <!-- Tabs -->
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="tab-login" onclick="showTab('tab-login')">
        Connexion
      </button>
      <button class="tab-btn" data-tab="tab-register" onclick="showTab('tab-register')">
        Inscription
      </button>
    </div>

    <!-- ── LOGIN ── -->
    <div id="tab-login" class="auth-tab-content">
      <div class="form-group">
        <label class="form-label">Numéro de téléphone</label>
        <input id="login-phone" type="tel" placeholder="+33 6 12 34 56 78"
               class="form-input" autocomplete="tel"/>
      </div>
      <div class="form-group">
        <label class="form-label">Code secret</label>
        <input id="login-secret" type="password" placeholder="••••••••"
               class="form-input" autocomplete="current-password"/>
      </div>
      <button onclick="handleLogin()" class="btn-primary w-full">
        Se connecter
      </button>
    </div>

    <!-- ── REGISTER ── -->
    <div id="tab-register" class="auth-tab-content hidden">
      <div class="form-group">
        <label class="form-label">Lien d'invitation</label>
        <input class="form-input invite-token-input" type="text"
               placeholder="Collez votre token d'invitation"/>
        <p class="token-status"></p>
      </div>

      <!-- Formulaire Personnel / DG -->
      <div class="role-form hidden" data-role="personnel">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Prénom</label>
            <input id="reg-firstname" type="text" class="form-input" placeholder="Prénom"/>
          </div>
          <div class="form-group">
            <label class="form-label">Nom</label>
            <input id="reg-lastname" type="text" class="form-input" placeholder="Nom"/>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Numéro</label>
          <input id="reg-phone" type="tel" class="form-input" placeholder="+33 6 …"/>
        </div>
        <div class="form-group">
          <label class="form-label">Code secret</label>
          <input id="reg-secret" type="password" class="form-input" placeholder="Choisir un code"/>
        </div>
      </div>

      <!-- Formulaire Collaborateur / Partenaire -->
      <div class="role-form hidden" data-role="collaborateur">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Prénom</label>
            <input id="reg-firstname" type="text" class="form-input" placeholder="Prénom"/>
          </div>
          <div class="form-group">
            <label class="form-label">Nom</label>
            <input id="reg-lastname" type="text" class="form-input" placeholder="Nom"/>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Fonction</label>
          <input id="reg-fonction" type="text" class="form-input" placeholder="Votre fonction"/>
        </div>
        <div class="form-group">
          <label class="form-label">Société</label>
          <input id="reg-company" type="text" class="form-input" placeholder="Nom de la société"/>
        </div>
        <div class="form-group">
          <label class="form-label">Numéro</label>
          <input id="reg-phone" type="tel" class="form-input" placeholder="+33 6 …"/>
        </div>
        <div class="form-group">
          <label class="form-label">Code secret</label>
          <input id="reg-secret" type="password" class="form-input" placeholder="Choisir un code"/>
        </div>
      </div>

      <div class="role-form hidden" data-role="partenaire">
        <!-- Même champs que collaborateur -->
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Prénom</label>
            <input id="reg-firstname" type="text" class="form-input" placeholder="Prénom"/>
          </div>
          <div class="form-group">
            <label class="form-label">Nom</label>
            <input id="reg-lastname" type="text" class="form-input" placeholder="Nom"/>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Fonction</label>
          <input id="reg-fonction" type="text" class="form-input" placeholder="Votre fonction"/>
        </div>
        <div class="form-group">
          <label class="form-label">Société partenaire</label>
          <input id="reg-company" type="text" class="form-input" placeholder="Nom de la société"/>
        </div>
        <div class="form-group">
          <label class="form-label">Numéro</label>
          <input id="reg-phone" type="tel" class="form-input" placeholder="+33 6 …"/>
        </div>
        <div class="form-group">
          <label class="form-label">Code secret</label>
          <input id="reg-secret" type="password" class="form-input" placeholder="Choisir un code"/>
        </div>
      </div>

      <button onclick="handleRegister()" class="btn-primary w-full mt-4">
        Créer mon compte
      </button>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════════
     SCREEN 3 — MAIN (Liste des groupes)
═══════════════════════════════════════════════════════════════ -->
<div id="screen-main" class="screen hidden flex-col">

  <!-- Header -->
  <header class="main-header">
    <div class="header-left">
      <div class="avatar-small">JS</div>
      <div>
        <p id="user-display-name" class="font-semibold text-sm leading-none">Utilisateur</p>
        <span id="user-role-badge" class="role-badge">RÔLE</span>
      </div>
    </div>
    <div class="header-actions">
      <button id="dg-panel" class="hidden btn-icon" onclick="showGroupMgmt()" title="Gestion groupes">
        ⚙️
      </button>
      <button class="btn-icon" onclick="handleLogout()" title="Déconnexion">
        🚪
      </button>
    </div>
  </header>

  <!-- Panneau DG — Génération lien invitation -->
  <div id="dg-panel-section" class="dg-section hidden">
    <div class="dg-card">
      <p class="dg-card-title">🔗 Générer un lien d'invitation</p>
      <div class="flex gap-2 mt-2">
        <select id="invite-role" class="form-select flex-1">
          <option value="personnel">Personnel</option>
          <option value="collaborateur">Collaborateur</option>
          <option value="partenaire">Partenaire</option>
          <option value="dg">DG</option>
        </select>
        <button onclick="generateInvitation()" class="btn-primary-sm">Générer</button>
      </div>
      <div id="invite-link-output" class="invite-link hidden"></div>
      <button onclick="copyInviteLink()" class="btn-copy hidden" id="btn-copy-invite">📋 Copier</button>
    </div>
  </div>

  <!-- Titre liste -->
  <div class="section-title-bar">
    <span>Mes Groupes</span>
  </div>

  <!-- Liste groupes -->
  <div id="groups-list" class="groups-list flex-1 overflow-y-auto">
    <p class="no-groups-msg">Chargement…</p>
  </div>

</div>

<!-- ═══════════════════════════════════════════════════════════════
     SCREEN 4 — CHAT
═══════════════════════════════════════════════════════════════ -->
<div id="screen-chat" class="screen hidden flex-col">

  <!-- Header chat -->
  <header class="chat-header">
    <button onclick="goBack()" class="btn-back">←</button>
    <div class="chat-header-info">
      <p id="chat-group-name" class="chat-group-title">Groupe</p>
      <span id="chat-group-type" class="chat-group-sub">type</span>
    </div>
  </header>

  <!-- Messages -->
  <div id="messages-list" class="messages-list flex-1 overflow-y-auto"></div>

  <!-- Voice preview -->
  <div id="voice-preview" class="voice-preview hidden">
    <audio id="voice-preview-player" controls class="flex-1"></audio>
    <button onclick="cancelVoice()" class="btn-icon text-red-400">✕</button>
    <button onclick="sendVoice()" class="btn-icon text-green-400">▶ Envoyer</button>
    <span id="record-timer" class="record-timer">00:00</span>
  </div>

  <!-- Emoji picker -->
  <div id="emoji-picker" class="emoji-picker hidden"></div>

  <!-- Input bar -->
  <div class="chat-input-bar">
    <button onclick="toggleEmoji()" class="btn-icon">😊</button>
    <input id="msg-input" type="text" placeholder="Message…" class="msg-input-field"
           autocomplete="off"/>
    <label class="btn-icon" title="Joindre un fichier">
      📎
      <input type="file" class="hidden" onchange="handleFileInput(event)"
             accept="image/*,video/*,audio/*,.pdf,.doc,.docx,.xls,.xlsx,.txt,.zip"/>
    </label>
    <button id="btn-voice" onclick="toggleRecording()" class="btn-icon btn-voice" title="Message vocal">
      🎤
    </button>
    <button onclick="sendMessage()" class="btn-send">
      ➤
    </button>
  </div>

</div>

<!-- ═══════════════════════════════════════════════════════════════
     SCREEN 5 — GESTION GROUPES (Admin)
═══════════════════════════════════════════════════════════════ -->
<div id="screen-group-mgmt" class="screen hidden flex-col">

  <header class="main-header">
    <button onclick="goBackFromAdmin()" class="btn-back">←</button>
    <h2 class="font-semibold">Gestion des Groupes</h2>
  </header>

  <!-- Créer un groupe -->
  <div class="admin-create-section">
    <p class="section-label">Nouveau groupe</p>
    <div class="flex gap-2">
      <input id="new-group-name" type="text" placeholder="Nom du groupe" class="form-input flex-1"/>
      <select id="new-group-type" class="form-select">
        <option value="permanent">Permanent</option>
        <option value="contractuel">Contractuel</option>
      </select>
    </div>
    <button onclick="createGroup()" class="btn-primary w-full mt-2">Créer</button>
  </div>

  <!-- Liste admin -->
  <div class="section-title-bar"><span>Groupes existants</span></div>
  <div id="admin-groups-list" class="flex-1 overflow-y-auto px-4 py-2 space-y-2"></div>

</div>

<!-- ═══════════════════════════════════════════════════════════════
     MODALS
═══════════════════════════════════════════════════════════════ -->
<!-- Modal membres -->
<div id="members-modal" class="modal-overlay hidden">
  <div class="modal-box">
    <div class="modal-header">
      <h3>Membres du groupe</h3>
      <button onclick="closeMembersModal()" class="btn-icon">✕</button>
    </div>
    <div id="members-modal-body" class="modal-body overflow-y-auto max-h-80"></div>
  </div>
</div>

<!-- Media overlay -->
<div id="media-overlay" class="media-overlay hidden" onclick="closeMedia()">
  <img id="media-overlay-img" src="" alt="Média" class="media-overlay-img"/>
</div>

<!-- ── Firebase SDK (modules) ───────────────────────────────────── -->
<script type="module" src="/app.js"></script>

</body>
</html>
